name: Build frozen releases

# PyInstaller can't cross-compile, so each OS's build has to actually run on
# that OS -- this matrix builds macOS, Windows, and Linux in parallel on
# GitHub's own runners for each platform.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: MultiMusicArchiver-macos
            build_path: dist/MultiMusicArchiver.app
          - os: windows-latest
            artifact_name: MultiMusicArchiver-windows
            build_path: dist/MultiMusicArchiver
          - os: ubuntu-latest
            artifact_name: MultiMusicArchiver-linux
            build_path: dist/MultiMusicArchiver

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Verify tkinter is available
        # actions/setup-python's Linux builds have not always shipped a
        # working _tkinter -- fail loudly here rather than deep inside a
        # confusing PyInstaller error if this interpreter lacks it.
        run: python -c "import tkinter; print('tkinter OK')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r packaging/requirements-build.txt

      - name: Build with PyInstaller
        run: python packaging/build.py

      - name: Smoke test embedded scdl/bandcamp-downloader
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXE="dist/MultiMusicArchiver.app/Contents/MacOS/MultiMusicArchiver"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            EXE="dist/MultiMusicArchiver/MultiMusicArchiver.exe"
          else
            EXE="dist/MultiMusicArchiver/MultiMusicArchiver"
          fi
          "$EXE" --run-scdl --version
          "$EXE" --run-bandcamp --help

      - name: Zip artifact
        shell: bash
        run: |
          cd "$(dirname "${{ matrix.build_path }}")"
          zip -r -y "${{ matrix.artifact_name }}.zip" "$(basename "${{ matrix.build_path }}")"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release with all platform builds attached
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
